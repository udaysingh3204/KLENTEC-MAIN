[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  VITE_SUPABASE_URL = "VITE_SUPABASE_URL"
  VITE_SUPABASE_ANON_KEY = "VITE_SUPABASE_ANON_KEY"
  VITE_EMAILJS_PUBLIC_KEY = "VITE_EMAILJS_PUBLIC_KEY"
  VITE_EMAILJS_SERVICE_HELLO = "VITE_EMAILJS_SERVICE_HELLO"
  VITE_EMAILJS_SERVICE_ADMIN = "VITE_EMAILJS_SERVICE_ADMIN"
  VITE_EMAILJS_TEMPLATE_INQUIRY = "VITE_EMAILJS_TEMPLATE_INQUIRY"
  VITE_EMAILJS_TEMPLATE_ADMIN = "VITE_EMAILJS_TEMPLATE_ADMIN"

# SPA routing - serve index.html for all routes
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Cache assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
